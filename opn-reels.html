<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juicebox: OPN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="opn-reels.css?v=3">
<link rel="stylesheet" href="opn-reels2.css?v=3">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">🧃</div>
      <div>
        <div class="brand-title">Juicebox</div>
        <div class="brand-subtitle">OPN Reel Inspiration</div>
      </div>
    </div>
  </div>
</header>
<div class="vending-wrap">
  <div class="vending-panel">
    <div class="vending-label">Select Category</div>
    <div class="vending-grid">
      <button class="vending-btn active" data-cat="restaurants" onclick="setCategory('restaurants')">
        <span class="vending-btn-icon">🍽</span>
        Restaurants
      </button>
      <button class="vending-btn" data-cat="hotels" onclick="setCategory('hotels')">
        <span class="vending-btn-icon">🏨</span>
        Hotels
      </button>
      <button class="vending-btn" data-cat="spa" onclick="setCategory('spa')">
        <span class="vending-btn-icon">🧖</span>
        Spa
      </button>
      <button class="vending-btn" data-cat="b2b" onclick="setCategory('b2b')">
        <span class="vending-btn-icon">💼</span>
        B2B Tech
      </button>
    </div>
  </div>
</div>
<div class="ignition-wrap">
  <div class="ignition-ring">
    <button class="ignition-btn" id="initiateBtn" onclick="initiate()">
      <span class="ignition-icon">⚡</span>
      <span>Start</span>
    </button>
  </div>
  <div class="ignition-label">Push to Initiate</div>
</div>
<div class="juicebox-overlay" id="juiceboxOverlay">
  <div class="juicebox-scene">
    <div class="jb-straw"></div>
    <div class="jb-straw-bend"></div>
    <div class="jb-box">
      <div class="jb-juice" id="jbJuice">
        <div class="jb-bubbles" id="jbBubbles"></div>
      </div>
      <div class="jb-label">JB</div>
    </div>
  </div>
  <p class="juicebox-text">Squeezing the juice...</p>
  <p class="juicebox-progress" id="jbProgress">Finding the freshest reels</p>
</div>
<div class="results" id="results">
  <div class="results-header">
    <h2 id="resultsTitle">Top Restaurant Reels</h2>
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="sel-bar" id="selBar">
  <span class="sel-count" id="selCount">0 reels selected</span>
  <button class="btn-plan" onclick="openPlanModal()">📋 Create Plan</button>
  <button class="btn-clear" onclick="clearSelection()">Clear</button>
</div>
<div class="modal-overlay" id="planModal">
  <div class="modal">
    <button class="modal-close" onclick="closePlanModal()">✕</button>
    <div id="planForm">
      <h2>📋 Create Shoot Plan</h2>
      <div class="form-group">
        <label>Client</label>
        <select id="clientSelect">
          <option value="">Select client...</option>
          <option>Hotel Washington</option>
          <option>Vue</option>
          <option>The Spa</option>
          <option>The Patio</option>
          <option>Fireclay</option>
          <option>DIAMO</option>
          <option>Royal Sonesta Dupont Circle</option>
          <option>Yours Truly DC</option>
          <option>SAX DC</option>
          <option>The Riggsby</option>
          <option>Blossom</option>
        </select>
      </div>
      <div class="form-group">
        <label>Shoot Date</label>
        <div class="calendar-wrap" id="calendarWrap"></div>
      </div>
      <div class="time-row">
        <div class="form-group">
          <label>Start Time</label>
          <div class="clock-wrap" id="clockStart"></div>
        </div>
        <div class="form-group">
          <label>End Time</label>
          <div class="clock-wrap" id="clockEnd"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Shot Types</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="Dinner"> Dinner</label>
          <label><input type="checkbox" value="Brunch"> Brunch</label>
          <label><input type="checkbox" value="Breakfast"> Breakfast</label>
          <label><input type="checkbox" value="Cocktails"> Cocktails</label>
          <label><input type="checkbox" value="Ambience"> Ambience</label>
          <label><input type="checkbox" value="Lifestyle"> Lifestyle</label>
        </div>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generateShotList()">🚀 Generate Shot List</button>
    </div>
    <div id="planLoading" class="loading-state" style="display:none">
      <div class="spinner"></div>
      <p>Generating your shot list...</p>
    </div>
    <div id="planResult" class="shot-result" style="display:none">
      <div class="icon">✅</div>
      <h3>Shot list ready!</h3>
      <a class="doc-link" id="docLink" href="#" target="_blank">Open Google Doc →</a>
      <div class="share-btns">
        <button onclick="copyDocLink()">📋 Copy Link</button>
        <button onclick="emailDoc()">✉️ Email</button>
      </div>
    </div>
  </div>
</div>
<div class="footer">
  <span class="footer-brand">Juicebox</span>
  <span class="footer-meta">OPN Agency • Powered by Lunchbreak</span>
</div>
<script src="opn-reels-data.js?v=3"></script>
<script src="opn-reels.js?v=3"></script>
</body>
</html>
