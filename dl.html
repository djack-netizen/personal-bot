<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Downloading...</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#111;color:#fff}
.box{text-align:center;padding:2rem}
.spinner{border:3px solid #333;border-top:3px solid #0095f6;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:#0095f6;text-decoration:none;font-size:1.1rem}
.error{color:#ff4444}
.manual{margin-top:1.5rem;font-size:0.9rem;color:#888}
</style>
</head><body>
<div class="box">
<div class="spinner" id="spinner"></div>
<p id="status">Fetching video...</p>
<p id="link" style="display:none"></p>
<p id="manual" class="manual" style="display:none"></p>
</div>
<script>
(async function(){
  var p=new URLSearchParams(location.search);
  var url=p.get('url');
  if(!url){document.getElementById('status').textContent='No URL provided';document.getElementById('spinner').style.display='none';return;}
  try{
    var fd=new URLSearchParams();fd.append('url',url);
    var r=await fetch('https://api.instasave.website/media',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd});
    var txt=await r.text();
    // Response uses \x22 for quotes - unescape first
    var unescaped=txt.replace(/\\x22/g,'"').replace(/\\x20/g,' ');
    // Find the video download link (the second cdn.instasave link is the video)
    var matches=unescaped.match(/https:\/\/cdn\.instasave\.website\/\?token=[^"]+/g);
    var videoUrl=null;
    if(matches){
      // Last match is typically the video (first is thumbnail)
      for(var i=0;i<matches.length;i++){
        if(matches[i].indexOf('.mp4')!==-1){videoUrl=matches[i];break;}
      }
      if(!videoUrl)videoUrl=matches[matches.length-1];
    }
    if(videoUrl){
      document.getElementById('status').textContent='Redirecting to download...';
      window.location.href=videoUrl;
      setTimeout(function(){
        document.getElementById('spinner').style.display='none';
        document.getElementById('status').textContent='If download did not start:';
        document.getElementById('link').style.display='block';
        document.getElementById('link').innerHTML='<a href="'+videoUrl+'">Tap here to download</a>';
      },2500);
    } else {
      throw new Error('No video link found');
    }
  }catch(e){
    document.getElementById('spinner').style.display='none';
    document.getElementById('status').className='error';
    document.getElementById('status').textContent='Failed: '+e.message;
    document.getElementById('link').style.display='block';
    document.getElementById('link').innerHTML='<a href="https://instasave.website/" target="_blank">Download manually on instasave.website</a>';
    document.getElementById('manual').style.display='block';
    document.getElementById('manual').textContent='Paste this URL: '+url;
  }
})();
</script>
</body></html>
