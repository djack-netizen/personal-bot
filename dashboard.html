let currentClient="sonesta",currentRange="7",chart=null;
function pctChange(curr,prev){if(prev===undefined||prev===null||prev===0)return"";var pct=((curr-prev)/Math.abs(prev)*100).toFixed(1);var cls=pct>=0?"up":"down";var arrow=pct>=0?"\u25B2":"\u25BC";return'<div class="change '+cls+'">'+arrow+" "+Math.abs(pct)+'%</div>';}
function fmt(v,type){if(type==="money")return"$"+Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(type==="pct")return Number(v).toFixed(2)+"%";if(type==="dec")return"$"+Number(v).toFixed(2);return Number(v).toLocaleString("en-US");}
function render(){var d=DATA[currentClient];if(!d)return;var kpi=d.kpis[currentRange]||{};var prev=kpi.prev||{};var isDiamo=currentClient==="diamo_b2b";var isMercy=currentClient==="mercy_me";
var cards=[{label:"Spend",value:fmt(kpi.spend||0,"money"),change:pctChange(kpi.spend||0,prev.spend)},{label:"Impressions",value:fmt(kpi.impressions||0,"num"),change:pctChange(kpi.impressions||0,prev.impressions)},{label:"Reach",value:fmt(kpi.reach||0,"num"),change:pctChange(kpi.reach||0,prev.reach)},{label:"Clicks",value:fmt(kpi.clicks||0,"num"),change:pctChange(kpi.clicks||0,prev.clicks)},{label:"CTR",value:fmt(kpi.ctr||0,"pct"),change:pctChange(kpi.ctr||0,prev.ctr)},{label:"CPC",value:fmt(kpi.cpc||0,"dec"),change:pctChange(kpi.cpc||0,prev.cpc)}];
if(isDiamo||isMercy)cards.push({label:"Leads",value:fmt(kpi.leads||0,"num"),change:pctChange(kpi.leads||0,prev.leads)});
cards.push({label:"Video Views",value:fmt(kpi.video_views||0,"num"),change:pctChange(kpi.video_views||0,prev.video_views)});
document.getElementById("kpiGrid").innerHTML=cards.map(function(c){return'<div class="kpi-card"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div>'+c.change+'</div>';}).join("");
var rangeN=parseInt(currentRange);var daily=d.daily||[];var recentDaily=daily.slice(-rangeN);var labels=recentDaily.map(function(r){return r.date.slice(5);});var spendData=recentDaily.map(function(r){return r.spend;});

if(isDiamo||isMercy){var leadsData=recentDaily.map(function(r){return r.leads||0;});chart=new Chart(ctx,{type:"bar",data:{labels:labels,datasets:[{label:"Daily Spend",data:spendData,backgroundColor:"rgba(26,115,232,0.7)",borderRadius:4,yAxisID:"y"},{label:"Leads",data:leadsData,type:"line",borderColor:"#34a853",backgroundColor:"rgba(52,168,83,0.2)",pointRadius:3,yAxisID:"y1",fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#888"}}},scales:{x:{ticks:{color:"#888"},grid:{display:false}},y:{position:"left",ticks:{color:"#888",callback:function(v){return"$"+v;}},grid:{color:"#222"}},y1:{position:"right",ticks:{color:"#34a853"},grid:{display:false}}}}});}
else{chart=new Chart(ctx,{type:"bar",data:{labels:labels,datasets:[{label:"Daily Spend",data:spendData,backgroundColor:"rgba(26,115,232,0.7)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#888"},grid:{display:false}},y:{ticks:{color:"#888",callback:function(v){return"$"+v;}},grid:{color:"#222"}}}}});}
var camps=(d.campaigns_by_range||{})[currentRange]||[];var hasCampaignLeads=isDiamo||isMercy;
var th="<tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th>"+(hasCampaignLeads?"<th>Leads</th>":"")+"<th>Video Views</th></tr>";
var rows=camps.map(function(c){return"<tr><td>"+c.campaign_name+"</td><td>"+fmt(c.spend,"money")+"</td><td>"+fmt(c.impressions,"num")+"</td><td>"+fmt(c.reach,"num")+"</td><td>"+fmt(c.clicks,"num")+"</td><td>"+fmt(c.ctr,"pct")+"</td><td>"+fmt(c.cpc,"dec")+"</td>"+(hasCampaignLeads?"<td>"+fmt(c.leads||0,"num")+"</td>":"")+"<td>"+fmt(c.video_views||0,"num")+"</td></tr>";}).join("");
