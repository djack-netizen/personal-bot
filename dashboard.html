let currentClient='sonesta',currentRange='7',chart=null;

function pctChange(curr,prev){
  if(prev===undefined||prev===null||prev===0)return"";
  const pct=((curr-prev)/Math.abs(prev)*100).toFixed(1);
  const cls=pct>=0?"up":"down";
  const arrow=pct>=0?"\u25B2":"\u25BC";
  return'<div class="change '+cls+'">'+arrow+' '+Math.abs(pct)+'%</div>';
}

function fmt(v,type){
  if(type==='money')return'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(type==='pct')return Number(v).toFixed(2)+'%';
  if(type==='dec')return'$'+Number(v).toFixed(2);
  return Number(v).toLocaleString('en-US');
}

function render(){
  const d=DATA[currentClient];
  if(!d)return;
  const kpi=d.kpis[currentRange]||{};
  const prev=kpi.prev||{};
  const isDiamo=currentClient==='diamo_b2b';

  let cards=[
    {label:'Spend',value:fmt(kpi.spend||0,'money'),change:pctChange(kpi.spend||0,prev.spend)},
    {label:'Impressions',value:fmt(kpi.impressions||0,'num'),change:pctChange(kpi.impressions||0,prev.impressions)},
    {label:'Reach',value:fmt(kpi.reach||0,'num'),change:pctChange(kpi.reach||0,prev.reach)},
    {label:'Clicks',value:fmt(kpi.clicks||0,'num'),change:pctChange(kpi.clicks||0,prev.clicks)},
    {label:'CTR',value:fmt(kpi.ctr||0,'pct'),change:pctChange(kpi.ctr||0,prev.ctr)},
    {label:'CPC',value:fmt(kpi.cpc||0,'dec'),change:pctChange(kpi.cpc||0,prev.cpc)},
  ];
  if(isDiamo)cards.push({label:'Leads',value:fmt(kpi.leads||0,'num'),change:pctChange(kpi.leads||0,prev.leads)});
  cards.push({label:'Video Views',value:fmt(kpi.video_views||0,'num'),change:pctChange(kpi.video_views||0,prev.video_views)});

  document.getElementById('kpiGrid').innerHTML=cards.map(c=>'<div class="kpi-card"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div>'+c.change+'</div>').join('');

  const daily=d.daily||[];
  const labels=daily.map(r=>r.date.slice(5));
  const spendData=daily.map(r=>r.spend);

  if(chart)chart.destroy();
  const ctx=document.getElementById('dailyChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'Daily Spend',data:spendData,backgroundColor:'rgba(26,115,232,0.7)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'},grid:{display:false}},y:{ticks:{color:'#888',callback:v=>'$'+v},grid:{color:'#222'}}}}
  });

  const camps=(d.campaigns_by_range||{})[currentRange]||[];
  let hasCampaignLeads=isDiamo;
  let th='<tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th>'+(hasCampaignLeads?'<th>Leads</th>':'')+'<th>Video Views</th></tr>';
  let rows=camps.map(c=>'<tr><td>'+c.campaign_name+'</td><td>'+fmt(c.spend,'money')+'</td><td>'+fmt(c.impressions,'num')+'</td><td>'+fmt(c.reach,'num')+'</td><td>'+fmt(c.clicks,'num')+'</td><td>'+fmt(c.ctr,'pct')+'</td><td>'+fmt(c.cpc,'dec')+'</td>'+(hasCampaignLeads?'<td>'+fmt(c.leads||0,'num')+'</td>':'')+'<td>'+fmt(c.video_views||0,'num')+'</td></tr>').join('');
  document.getElementById('campaignTable').innerHTML=camps.length?'<table>'+th+rows+'</table>':'<p style="color:#666;text-align:center;padding:20px;">No active campaigns in this period</p>';
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  currentClient=this.dataset.client;
  render();
}));
document.querySelectorAll('.range-tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.range-tab').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');
  currentRange=this.dataset.range;
  render();
}));
render();
</script>
