document.getElementById("kpiGrid").innerHTML=cards.map(function(c){return'<div class="kpi-card"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div>'+c.change+'</div>';}).join("");
var rangeN=parseInt(currentRange);var daily=d.daily||[];var recentDaily=daily.slice(-rangeN);var labels=recentDaily.map(function(r){return r.date.slice(5);});var spendData=recentDaily.map(function(r){return r.spend;});
if(chart)chart.destroy();var ctx=document.getElementById("dailyChart").getContext("2d");
if(isDiamo||isMercy){var leadsData=recentDaily.map(function(r){return r.leads||0;});chart=new Chart(ctx,{type:"bar",data:{labels:labels,datasets:[{label:"Daily Spend",data:spendData,backgroundColor:"rgba(26,115,232,0.7)",borderRadius:4,yAxisID:"y"},{label:"Leads",data:leadsData,type:"line",borderColor:"#34a853",backgroundColor:"rgba(52,168,83,0.2)",pointRadius:3,yAxisID:"y1",fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#888"}}},scales:{x:{ticks:{color:"#888"},grid:{display:false}},y:{position:"left",ticks:{color:"#888",callback:function(v){return"$"+v;}},grid:{color:"#222"}},y1:{position:"right",ticks:{color:"#34a853"},grid:{display:false}}}}});}else{chart=new Chart(ctx,{type:"bar",data:{labels:labels,datasets:[{label:"Daily Spend",data:spendData,backgroundColor:"rgba(26,115,232,0.7)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#888"},grid:{display:false}},y:{ticks:{color:"#888",callback:function(v){return"$"+v;}},grid:{color:"#222"}}}}});}
var camps=(d.campaigns_by_range||{})[currentRange]||[];var hasCampaignLeads=isDiamo||isMercy;
var th="<tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th>"+(hasCampaignLeads?"<th>Leads</th>":"")+"<th>Video Views</th></tr>";
var rows=camps.map(function(c){return"<tr><td>"+c.campaign_name+"</td><td>"+fmt(c.spend,"money")+"</td><td>"+fmt(c.impressions,"num")+"</td><td>"+fmt(c.reach,"num")+"</td><td>"+fmt(c.clicks,"num")+"</td><td>"+fmt(c.ctr,"pct")+"</td><td>"+fmt(c.cpc,"dec")+"</td>"+(hasCampaignLeads?"<td>"+fmt(c.leads||0,"num")+"</td>":"")+"<td>"+fmt(c.video_views||0,"num")+"</td></tr>";}).join("");
document.getElementById("campaignTable").innerHTML=camps.length?"<table>"+th+rows+"</table>":"<p style='color:#666;text-align:center;padding:20px;'>No active campaigns in this period</p>";}
document.getElementById("clientTabs").addEventListener("click",function(e){var t=e.target.closest(".tab");if(!t)return;document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");currentClient=t.dataset.client;render();});
document.getElementById("rangeTabs").addEventListener("click",function(e){var t=e.target.closest(".range-tab");if(!t)return;document.querySelectorAll(".range-tab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");currentRange=t.dataset.range;render();});
render();
</script>
