    <div class="kpi-card"><div class="label">CTR</div><div class="value">${fmtPct(r.ctr)}</div>${pctChange(r.ctr,prev.ctr)}</div>
    <div class="kpi-card"><div class="label">CPC</div><div class="value">${fmtMoney(r.cpc)}</div>${pctChange(r.cpc,prev.cpc)}</div>
    ${isdiamo?`<div class="kpi-card"><div class="label">Leads</div><div class="value">${fmtInt(r.leads||0)}</div>${pctChange(r.leads,prev.leads)}</div>`:""}</div>`;
  const camps=(d.campaigns_by_range||{})[currentRange]||[];
  let campRows=camps.map(c=>`<tr><td>${c.campaign_name}</td><td>${fmtMoney(c.spend)}</td><td>${fmtInt(c.impressions)}</td><td>${fmtInt(c.clicks)}</td><td>${fmtPct(c.ctr)}</td><td>${fmtMoney(c.cpc)}</td></tr>`).join("");
  let campTable=camps.length?`<h3 style="margin:24px 0 12px;font-size:16px;color:#fff;">Campaign Breakdown</h3><table><thead><tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>CPC</th></tr></thead><tbody>${campRows}</tbody></table>`:"";
  let chartHtml=`<h3 style="margin:24px 0 12px;font-size:16px;color:#fff;">Daily Spend</h3><div class="chart-container"><canvas id="dailyChart"></canvas></div>`;
  el.innerHTML=kpis+chartHtml+campTable;
  const daily=d.daily||[];const ctx=document.getElementById("dailyChart").getContext("2d");
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(ctx,{type:"line",data:{labels:daily.map(x=>x.date),datasets:[{label:"Daily Spend ($)",data:daily.map(x=>x.spend),borderColor:"#1a73e8",backgroundColor:"rgba(26,115,232,0.1)",fill:true,tension:0.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#888"}}},scales:{x:{ticks:{color:"#666",maxTicksLimit:10},grid:{color:"#222"}},y:{ticks:{color:"#666",callback:v=>"$"+v},grid:{color:"#222"}}}}});
}
renderTabs();renderContent();
</script></body></html>
