<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard — OPN Agency</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0}
.header{background:#111;padding:20px 32px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#fff}.header .updated{font-size:12px;color:#888}
.tabs{display:flex;gap:0;background:#111;padding:0 32px;border-bottom:1px solid #222}
.tab{padding:12px 24px;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-size:14px;font-weight:500}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}.tab:hover{color:#fff}
.range-tabs{display:flex;gap:8px;padding:20px 32px 0}
.range-tab{padding:6px 16px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:13px}
.range-tab.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.content{padding:20px 32px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#161616;border-radius:12px;padding:20px;border:1px solid #222}
.kpi-card .label{font-size:12px;color:#888;text-transform:uppercase;margin-bottom:8px}
.kpi-card .value{font-size:24px;font-weight:700;color:#fff}
.kpi-card .change{font-size:12px;margin-top:4px}
.kpi-card .change.up{color:#34a853}.kpi-card .change.down{color:#ea4335}
.chart-container{background:#161616;border-radius:12px;padding:20px;border:1px solid #222;margin-bottom:24px;height:300px;position:relative}
table{width:100%;border-collapse:collapse;background:#161616;border-radius:12px;overflow:hidden;border:1px solid #222}
th{text-align:left;padding:12px 16px;background:#1a1a1a;color:#888;font-size:12px;text-transform:uppercase;font-weight:600}
td{padding:12px 16px;border-top:1px solid #222;font-size:14px}
</style></head><body>
<div class="header"><h1>Meta Ads Dashboard</h1><div class="updated">Last updated: March 18, 2026 11:00 AM UTC</div></div>
<div class="tabs" id="clientTabs"></div>
<div class="range-tabs" id="rangeTabs">
  <div class="range-tab active" onclick="showRange('7')">7 Days</div>
  <div class="range-tab" onclick="showRange('14')">14 Days</div>
  <div class="range-tab" onclick="showRange('30')">30 Days</div>
</div>
<div class="content" id="content"></div>
<script>
/* Dashboard data and rendering code - see full version in workspace */
const DATA = {"sonesta":{"label":"Sonesta","kpis":{"7":{"spend":110.64,"impressions":37319,"clicks":695,"ctr":1.86,"cpc":0.16,"reach":32711},"14":{"spend":298.78,"impressions":97359,"clicks":1652,"ctr":1.70,"cpc":0.18,"reach":81978},"30":{"spend":992.85,"impressions":318565,"clicks":5013,"ctr":1.57,"cpc":0.20,"reach":234829}},"daily":[],"campaigns_by_range":{"7":[],"14":[],"30":[]}},"sax":{"label":"SAX","kpis":{"7":{"spend":0,"impressions":0,"clicks":0,"ctr":0,"cpc":0,"reach":0},"14":{"spend":0,"impressions":0,"clicks":0,"ctr":0,"cpc":0,"reach":0},"30":{"spend":35.22,"impressions":6515,"clicks":794,"ctr":12.19,"cpc":0.04,"reach":5804}},"daily":[],"campaigns_by_range":{"7":[],"14":[],"30":[]}},"mercy_me":{"label":"Mercy Me","kpis":{"7":{"spend":789.39,"impressions":111457,"clicks":5313,"ctr":4.77,"cpc":0.15,"reach":74039},"14":{"spend":1533.52,"impressions":216061,"clicks":10310,"ctr":4.77,"cpc":0.15,"reach":113324},"30":{"spend":2297.73,"impressions":336002,"clicks":15651,"ctr":4.66,"cpc":0.15,"reach":151807}},"daily":[],"campaigns_by_range":{"7":[],"14":[],"30":[]}},"diamo_b2b":{"label":"DIAMO B2B","kpis":{"7":{"spend":523.38,"impressions":10719,"clicks":182,"ctr":1.70,"cpc":2.88,"reach":6181,"leads":16},"14":{"spend":1009,"impressions":23284,"clicks":449,"ctr":1.93,"cpc":2.25,"reach":12026,"leads":38},"30":{"spend":1999.30,"impressions":47916,"clicks":976,"ctr":2.04,"cpc":2.05,"reach":21705,"leads":78}},"daily":[],"campaigns_by_range":{"7":[],"14":[],"30":[]}}};
const CLIENTS=Object.keys(DATA);let currentClient=CLIENTS[0],currentRange="7",chartInstance=null;
function fmtMoney(v){return"$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtInt(v){return Number(v).toLocaleString()}
function fmtPct(v){return Number(v).toFixed(2)+"%"}
function renderTabs(){const el=document.getElementById("clientTabs");el.innerHTML="";CLIENTS.forEach(k=>{const t=document.createElement("div");t.className="tab"+(k===currentClient?" active":"");t.textContent=DATA[k].label;t.onclick=()=>{currentClient=k;renderTabs();renderContent()};el.appendChild(t)})}
function showRange(r){currentRange=r;document.querySelectorAll(".range-tab").forEach(t=>t.classList.remove("active"));event.target.classList.add("active");renderContent()}
function renderContent(){const el=document.getElementById("content");const d=DATA[currentClient];const r=d.kpis[currentRange];const isdiamo=currentClient==="diamo_b2b";
let kpis='<div class="kpi-grid"><div class="kpi-card"><div class="label">Spend</div><div class="value">'+fmtMoney(r.spend)+'</div></div><div class="kpi-card"><div class="label">Impressions</div><div class="value">'+fmtInt(r.impressions)+'</div></div><div class="kpi-card"><div class="label">Reach</div><div class="value">'+fmtInt(r.reach)+'</div></div><div class="kpi-card"><div class="label">Clicks</div><div class="value">'+fmtInt(r.clicks)+'</div></div><div class="kpi-card"><div class="label">CTR</div><div class="value">'+fmtPct(r.ctr)+'</div></div><div class="kpi-card"><div class="label">CPC</div><div class="value">'+fmtMoney(r.cpc)+'</div></div>'+(isdiamo?'<div class="kpi-card"><div class="label">Leads</div><div class="value">'+fmtInt(r.leads||0)+'</div></div>':'')+'</div>';
el.innerHTML=kpis+'<p style="color:#666;margin-top:20px">Note: This is the backup copy. Full dashboard with charts and campaign data available in workspace.</p>'}
renderTabs();renderContent();
</script></body></html>
