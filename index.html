const CLIENTS = {"sonesta":"Sonesta","sax":"SAX","mercyme":"Mercy Me","diamo":"DIAMO B2B"};
let currentClient = Object.keys(CLIENTS)[0];
let currentRange = "7";
let chartInstance = null;

function pctChange(curr, prev) {
  if (!prev || prev === 0) return "";
  const pct = ((curr - prev) / prev * 100).toFixed(1);
  const cls = pct >= 0 ? "up" : "down";
  const arrow = pct >= 0 ? "▲" : "▼";
  return `<div class="change ${cls}">${arrow} ${Math.abs(pct)}% MoM</div>`;
}

function fmtMoney(v) { return "$" + Number(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(v) { return Number(v).toLocaleString(); }
function fmtPct(v) { return Number(v).toFixed(2) + "%"; }

function renderTabs() {
  const el = document.getElementById("clientTabs");
  el.innerHTML = "";
  for (const [k, label] of Object.entries(CLIENTS)) {
    const tab = document.createElement("div");
    tab.className = "tab" + (k === currentClient ? " active" : "");
    tab.textContent = label;
    tab.onclick = () => showClient(k);
    el.appendChild(tab);
  }
}

function showClient(k) {
  currentClient = k;
  renderTabs();
  renderContent();
}

function showRange(r) {
  currentRange = r;
  document.querySelectorAll(".range-tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  renderContent();
}

function renderContent() {
  const el = document.getElementById("content");
  const d = DATA[currentClient];
  const r = d[currentRange];
  const prev = r.prev || {};
  const isdiamo = currentClient === "diamo";

  let kpis = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="label">Spend</div><div class="value">${fmtMoney(r.spend)}</div>${pctChange(r.spend, prev.spend)}</div>
      <div class="kpi-card"><div class="label">Impressions</div><div class="value">${fmtInt(r.impressions)}</div>${pctChange(r.impressions, prev.impressions)}</div>
      <div class="kpi-card"><div class="label">Reach</div><div class="value">${fmtInt(r.reach)}</div>${pctChange(r.reach, prev.reach)}</div>
      <div class="kpi-card"><div class="label">Clicks</div><div class="value">${fmtInt(r.clicks)}</div>${pctChange(r.clicks, prev.clicks)}</div>
      <div class="kpi-card"><div class="label">CTR</div><div class="value">${fmtPct(r.ctr)}</div>${pctChange(r.ctr, prev.ctr)}</div>
      <div class="kpi-card"><div class="label">CPC</div><div class="value">${fmtMoney(r.cpc)}</div>${pctChange(r.cpc, prev.cpc)}</div>
      ${isdiamo ? `<div class="kpi-card"><div class="label">Leads</div><div class="value">${fmtInt(r.leads || 0)}</div>${pctChange(r.leads, prev.leads)}</div>` : ""}
    </div>`;

  // Campaigns table
  const camps = (d.campaigns_by_range || {})[currentRange] || [];
  let campRows = camps.map(c => `<tr>
    <td>${c.campaign_name || c.name}</td>
    <td>${fmtMoney(c.spend)}</td>
    <td>${fmtInt(c.impressions)}</td>
    <td>${fmtInt(c.clicks)}</td>
    <td>${fmtPct(c.ctr)}</td>
    <td>${fmtMoney(c.cpc)}</td>
  </tr>`).join("");

  let campTable = camps.length ? `
    <h3 style="margin:24px 0 12px;font-size:16px;color:#fff;">Campaign Breakdown</h3>
    <table>
      <thead><tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>CPC</th></tr></thead>
      <tbody>${campRows}</tbody>
    </table>` : "";

  let chartHtml = `<h3 style="margin:24px 0 12px;font-size:16px;color:#fff;">Daily Spend</h3>
    <div class="chart-container"><canvas id="dailyChart"></canvas></div>`;

  el.innerHTML = kpis + chartHtml + campTable;

  // Render chart
  const daily = d.daily || [];
  const ctx = document.getElementById("dailyChart").getContext("2d");
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: daily.map(x => x.date),
      datasets: [{
        label: "Daily Spend ($)",
        data: daily.map(x => x.spend),
        borderColor: "#1a73e8",
        backgroundColor: "rgba(26,115,232,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#888" } } },
      scales: {
        x: { ticks: { color: "#666", maxTicksLimit: 10 }, grid: { color: "#222" } },
        y: { ticks: { color: "#666", callback: v => "$"+v }, grid: { color: "#222" } }
      }
    }
  });
}

renderTabs();
renderContent();
</script>
