document.getElementById("clientTabs").addEventListener("click",function(e){var t=e.target.closest(".tab");if(!t)return;document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");currentClient=t.dataset.client;render();});
document.getElementById("rangeTabs").addEventListener("click",function(e){var t=e.target.closest(".range-tab");if(!t)return;document.querySelectorAll(".range-tab").forEach(function(x){x.classList.remove("active");});t.classList.add("active");currentRange=t.dataset.range;render();});
render();
</script>
