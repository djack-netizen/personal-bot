const CLIENTS = Object.keys(DATA);

let currentRange = "7";

function pctChange(curr,prev){if(prev===undefined||prev===null||prev===0)return"";const pct=((curr-prev)/Math.abs(prev)*100).toFixed(1);const cls=pct>=0?"up":"down";const arrow=pct>=0?"\u25B2":"\u25BC";return`<div class="change ${cls}">${arrow} ${Math.abs(pct)}%</div>`}
function fmtMoney(v){return"$"+Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtInt(v){return Number(v).toLocaleString()}
function fmtPct(v){return Number(v).toFixed(2)+"%"}
function renderTabs(){const el=document.getElementById("clientTabs");el.innerHTML="";CLIENTS.forEach(k=>{const t=document.createElement("div");t.className="tab"+(k===currentClient?" active":"");t.textContent=DATA[k].label;t.onclick=()=>showClient(k);el.appendChild(t)})}

function showRange(r){currentRange=r;document.querySelectorAll(".range-tab").forEach(t=>t.classList.remove("active"));event.target.classList.add("active");renderContent()}
function renderContent(){

  const camps=(d.campaigns_by_range||{})[currentRange]||[];
  let campRows=camps.map(c=>`<tr><td>${c.campaign_name}</td><td>${fmtMoney(c.spend)}</td><td>${fmtInt(c.impressions)}</td><td>${fmtInt(c.clicks)}</td><td>${fmtPct(c.ctr)}</td><td>${fmtMoney(c.cpc)}</td>${isdiamo?`<td>${fmtInt(c.leads||0)}</td>`:""}</tr>`).join("");
  let campTable=camps.length?`<h3 style="margin:24px 0 12px;font-size:16px;color:#fff;">Campaign Breakdown</h3><table><thead><tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>CPC</th>${isdiamo?"<th>Leads</th>":""}</tr></thead><tbody>${campRows}</tbody></table>`:"";

  el.innerHTML=kpis+chartHtml+campTable;
