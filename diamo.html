* { margin:0; padding:0; box-sizing:border-box; }

.header { background: #111; padding: 20px 32px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }

.range-tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 13px; }

.content { padding: 20px 32px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: #161616; border-radius: 12px; padding: 20px; border: 1px solid #222; }
.kpi-card .label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
.kpi-card .value { font-size: 24px; font-weight: 700; color: #fff; }
.kpi-card .change { font-size: 12px; margin-top: 4px; }
.kpi-card .change.up { color: #34a853; }
.kpi-card .change.down { color: #ea4335; }
.chart-container { background: #161616; border-radius: 12px; padding: 20px; border: 1px solid #222; margin-bottom: 24px; height: 300px; position: relative; }
table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
th { text-align: left; padding: 12px 16px; background: #1a1a1a; color: #888; font-size: 12px; text-transform: uppercase; font-weight: 600; }

function pctChange(curr, prev) {
  if (!prev || prev === 0) return "";
  const pct = ((curr - prev) / prev * 100).toFixed(1);
  const cls = pct >= 0 ? "up" : "down";
  const arrow = pct >= 0 ? "▲" : "▼";
  return `<div class="change ${cls}">${arrow} ${Math.abs(pct)}% MoM</div>`;
}

function fmtMoney(v) { return "$" + Number(v).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtInt(v) { return Number(v).toLocaleString(); }
function fmtPct(v) { return Number(v).toFixed(2) + "%"; }

function showRange(r, el) {
  currentRange = r;
  document.querySelectorAll(".range-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function render() {
  const el = document.getElementById("content");

      <div class="kpi-card"><div class="label">Leads</div><div class="value">${fmtInt(r.leads || 0)}</div>${pctChange(r.leads, prev.leads)}</div>

    <td>${fmtMoney(c.spend)}</td>
    <td>${fmtInt(c.impressions)}</td>
    <td>${fmtInt(c.clicks)}</td>
    <td>${fmtPct(c.ctr)}</td>
    <td>${fmtMoney(c.cpc)}</td>
    <td>${fmtInt(c.leads || 0)}</td>
  </tr>`).join("");

  let campTable = camps.length ? `

      <thead><tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>CPC</th><th>Leads</th></tr></thead>
      <tbody>${campRows}</tbody>
    </table>` : "";

    <div class="chart-container"><canvas id="dailyChart"></canvas></div>`;

  el.innerHTML = kpis + chartHtml + campTable;

}
