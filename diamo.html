<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAMO B2B — Ad Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#e4e4e7;--muted:#a1a1aa;--grad:linear-gradient(135deg,#6366f1,#3b82f6);--grad2:linear-gradient(135deg,#6366f1,#3b82f6,#00d4ff);--green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:16px;--pill:999px}
body{font-family:'Plus Jakarta Sans',Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.fade-in{animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
.title-area{margin-bottom:36px;text-align:center}
.title-area h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.title-area .powered{color:var(--muted);font-size:.88rem;margin-bottom:14px}
.social-pills{display:flex;gap:10px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.social-pill{display:inline-flex;align-items:center;gap:6px;border-radius:var(--pill);padding:5px 14px;font-size:.78rem;font-weight:600;border:1px solid transparent;background-origin:border-box;background-clip:padding-box,border-box;background-image:linear-gradient(var(--bg),var(--bg)),var(--grad2);color:var(--text);text-decoration:none;transition:all .25s}
.social-pill:hover{box-shadow:0 0 12px rgba(99,102,241,.3);transform:translateY(-1px)}
.social-pill svg{width:14px;height:14px;fill:currentColor}
.period-badge{display:inline-block;border-radius:var(--pill);padding:4px 14px;font-size:.75rem;color:var(--muted);border:1px solid var(--border);background:var(--card)}
.date-pills{display:flex;gap:8px}
.date-pill{border-radius:var(--pill);padding:6px 18px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .25s}
.date-pill:hover{border-color:rgba(99,102,241,.4);color:var(--text)}
.date-pill.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 0 16px rgba(99,102,241,.35)}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(10px);padding:22px 20px;transition:all .3s;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;transition:opacity .3s;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(59,130,246,.06))}
.kpi-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,.25);box-shadow:0 8px 32px rgba(99,102,241,.12)}
.kpi-card:hover::before{opacity:1}
.kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px}
.kpi-value{font-size:1.55rem;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.kpi-change{font-size:.78rem;font-weight:600;margin-top:4px}
.kpi-change.up{color:#22c55e}
.kpi-change.down{color:#ef4444}
.kpi-change.neutral{color:var(--muted)}
.section-title{font-size:1.15rem;font-weight:700;margin-bottom:16px}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(10px);overflow-x:auto;margin-bottom:36px}
table{width:100%;border-collapse:collapse;min-width:700px}
th{text-align:left;padding:14px 16px;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:14px 16px;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.pill{display:inline-flex;align-items:center;border-radius:var(--pill);padding:3px 12px;font-size:.73rem;font-weight:600}
.pill-active{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.chart-grid-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:36px}
.chart-area{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(10px);padding:24px;position:relative}
.chart-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.footer{text-align:center;padding:24px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border)}
.footer strong{color:var(--text);font-weight:700}
.data-container{transition:opacity .3s}
.data-container.switching{opacity:0}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.chart-grid-row{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr 1fr}.container{padding:20px 14px}.title-area h1{font-size:1.4rem}}
.view-link{display:inline-flex;align-items:center;gap:4px;color:#818cf8;font-size:.78rem;font-weight:600;text-decoration:none;transition:all .2s;white-space:nowrap}
.view-link:hover{color:#a5b4fc;text-decoration:underline}
.view-link svg{width:12px;height:12px;fill:currentColor}
</style>
</head>
<body>

<div class="container">
  <div class="title-area fade-in">
    <h1>DIAMO B2B — Ad Performance Dashboard</h1>
    <div class="powered">Powered by <strong>OPN Agency</strong></div>
    <div class="social-pills">
      <a href="https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=US&search_type=keyword_unordered&q=DIAMO" target="_blank" class="social-pill"><svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm1 17h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>Ad Library</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px;justify-content:center">
      <div class="period-badge" id="periodBadge">Feb 20 – Feb 26, 2026</div>
      <div class="date-pills">
        <div class="date-pill active" onclick="setRange(7)">7 Days</div>
        <div class="date-pill" onclick="setRange(30)">30 Days</div>
      </div>
    </div>
  </div>

  <div class="data-container" id="dataContainer">
    <div class="kpi-row fade-in" id="kpiRow"></div>

    <div class="section-title fade-in">Campaigns</div>
    <div class="table-wrap fade-in">
      <table>
        <thead>
          <tr><th>Campaign</th><th>Status</th><th>Spend</th><th>Impressions</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th><th>Leads</th><th>Ad Preview</th></tr>
        </thead>
        <tbody id="campaignBody"></tbody>
      </table>
    </div>

    <div class="chart-grid-row fade-in">
      <div class="chart-area">
        <div class="chart-title">Daily Ad Spend & Leads</div>
        <canvas id="performanceChart" height="200"></canvas>
      </div>
      <div class="chart-area">
        <div class="chart-title">Daily Reach</div>
        <canvas id="reachChart" height="200"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <div>Last Updated: <strong>Feb 27, 2026 5:00 PM UTC</strong></div>
  <div>Powered by <strong>OPN Agency</strong></div>
</div>

<script>
// Data from Meta Ads API
const KPI_DATA = {"7": {"spend": 437.22, "impressions": 10594, "clicks": 235, "ctr": 2.2182, "cpc": 1.8605, "reach": 6159, "leads": 18, "video_views": 1898, "prev": {"spend": 415.48, "impressions": 9789, "clicks": 202, "ctr": 2.0635, "cpc": 2.0568, "reach": 5814}}, "14": {"spend": 852.7, "impressions": 20383, "clicks": 437, "ctr": 2.1439, "cpc": 1.9513, "reach": 10327, "leads": 34, "video_views": 3643, "prev": {"spend": 858.75, "impressions": 24926, "clicks": 474, "ctr": 1.9016, "cpc": 1.8117, "reach": 15511}}, "30": {"spend": 1813.43, "impressions": 47682, "clicks": 949, "ctr": 1.9903, "cpc": 1.9109, "reach": 25311, "leads": 86, "video_views": 8162, "prev": {"spend": 1442.89, "impressions": 52961, "clicks": 977, "ctr": 1.8448, "cpc": 1.4769, "reach": 26671}}};

const CAMPAIGNS_BY_RANGE = {"7": [{"campaign_name": "", "campaign_id": "", "spend": 176.55, "impressions": 4619, "clicks": 104, "ctr": 2.2516, "cpc": 1.6976, "reach": 2680, "leads": 12, "video_views": 656}, {"campaign_name": "", "campaign_id": "", "spend": 110.97, "impressions": 2215, "clicks": 29, "ctr": 1.3093, "cpc": 3.8266, "reach": 1516, "leads": 3, "video_views": 354}, {"campaign_name": "", "campaign_id": "", "spend": 77.72, "impressions": 2677, "clicks": 79, "ctr": 2.9511, "cpc": 0.9838, "reach": 2094, "leads": 0, "video_views": 564}, {"campaign_name": "", "campaign_id": "", "spend": 71.98, "impressions": 1083, "clicks": 23, "ctr": 2.1237, "cpc": 3.1296, "reach": 794, "leads": 3, "video_views": 324}], "14": [{"campaign_name": "", "campaign_id": "", "spend": 350.38, "impressions": 8583, "clicks": 204, "ctr": 2.3768, "cpc": 1.7175, "reach": 4184, "leads": 24, "video_views": 1343}, {"campaign_name": "", "campaign_id": "", "spend": 213.23, "impressions": 4242, "clicks": 67, "ctr": 1.5794, "cpc": 3.1825, "reach": 2380, "leads": 7, "video_views": 749}, {"campaign_name": "", "campaign_id": "", "spend": 154.25, "impressions": 5489, "clicks": 126, "ctr": 2.2955, "cpc": 1.2242, "reach": 4165, "leads": 0, "video_views": 954}, {"campaign_name": "", "campaign_id": "", "spend": 134.84, "impressions": 2069, "clicks": 40, "ctr": 1.9333, "cpc": 3.371, "reach": 1402, "leads": 3, "video_views": 597}], "30": [{"campaign_name": "", "campaign_id": "", "spend": 660.98, "impressions": 20468, "clicks": 445, "ctr": 2.1741, "cpc": 1.4853, "reach": 10385, "leads": 54, "video_views": 2827}, {"campaign_name": "", "campaign_id": "", "spend": 396.74, "impressions": 7932, "clicks": 141, "ctr": 1.7776, "cpc": 2.8138, "reach": 4141, "leads": 18, "video_views": 1545}, {"campaign_name": "", "campaign_id": "", "spend": 332.38, "impressions": 13303, "clicks": 208, "ctr": 1.5636, "cpc": 1.598, "reach": 9901, "leads": 0, "video_views": 2178}, {"campaign_name": "", "campaign_id": "", "spend": 301.09, "impressions": 5031, "clicks": 124, "ctr": 2.4647, "cpc": 2.4281, "reach": 2428, "leads": 9, "video_views": 1320}, {"campaign_name": "", "campaign_id": "", "spend": 122.24, "impressions": 948, "clicks": 31, "ctr": 3.27, "cpc": 3.9432, "reach": 716, "leads": 5, "video_views": 292}]};

const DAILY_7 = [{"date": "2026-02-24", "spend": 60.22, "impressions": 1354, "clicks": 41, "reach": 1081}, {"date": "2026-02-25", "spend": 57.46, "impressions": 1611, "clicks": 25, "reach": 1307}, {"date": "2026-02-26", "spend": 64.18, "impressions": 1457, "clicks": 24, "reach": 1175}, {"date": "2026-02-27", "spend": 57.57, "impressions": 1234, "clicks": 20, "reach": 1063}, {"date": "2026-02-28", "spend": 57.64, "impressions": 1511, "clicks": 38, "reach": 1225}, {"date": "2026-03-01", "spend": 70.51, "impressions": 1629, "clicks": 46, "reach": 1380}, {"date": "2026-03-02", "spend": 69.64, "impressions": 1798, "clicks": 41, "reach": 1460}];
const DAILY_30 = [{"date": "2026-02-01", "spend": 54.31, "impressions": 836, "clicks": 15, "reach": 770}, {"date": "2026-02-02", "spend": 47.67, "impressions": 1537, "clicks": 23, "reach": 1454}, {"date": "2026-02-03", "spend": 46.95, "impressions": 846, "clicks": 12, "reach": 764}, {"date": "2026-02-04", "spend": 37.47, "impressions": 710, "clicks": 12, "reach": 662}, {"date": "2026-02-05", "spend": 40.32, "impressions": 753, "clicks": 18, "reach": 707}, {"date": "2026-02-06", "spend": 93.53, "impressions": 1862, "clicks": 34, "reach": 1702}, {"date": "2026-02-07", "spend": 79.78, "impressions": 2147, "clicks": 45, "reach": 1899}, {"date": "2026-02-08", "spend": 65.56, "impressions": 1971, "clicks": 27, "reach": 1718}, {"date": "2026-02-09", "spend": 68.76, "impressions": 2053, "clicks": 35, "reach": 1784}, {"date": "2026-02-10", "spend": 66.52, "impressions": 2004, "clicks": 52, "reach": 1723}, {"date": "2026-02-11", "spend": 59.37, "impressions": 2064, "clicks": 39, "reach": 1704}, {"date": "2026-02-12", "spend": 55.88, "impressions": 1858, "clicks": 29, "reach": 1565}, {"date": "2026-02-13", "spend": 58.6, "impressions": 1772, "clicks": 37, "reach": 1545}, {"date": "2026-02-14", "spend": 50.4, "impressions": 1993, "clicks": 37, "reach": 1725}, {"date": "2026-02-15", "spend": 68.81, "impressions": 2380, "clicks": 46, "reach": 1949}, {"date": "2026-02-16", "spend": 66.8, "impressions": 2513, "clicks": 51, "reach": 2201}, {"date": "2026-02-17", "spend": 64.38, "impressions": 1463, "clicks": 30, "reach": 1207}, {"date": "2026-02-18", "spend": 60.2, "impressions": 1132, "clicks": 27, "reach": 883}, {"date": "2026-02-19", "spend": 61.62, "impressions": 1240, "clicks": 27, "reach": 979}, {"date": "2026-02-20", "spend": 56.37, "impressions": 1481, "clicks": 27, "reach": 1177}, {"date": "2026-02-21", "spend": 45.62, "impressions": 1142, "clicks": 22, "reach": 982}, {"date": "2026-02-22", "spend": 66.87, "impressions": 1710, "clicks": 45, "reach": 1440}, {"date": "2026-02-23", "spend": 60.42, "impressions": 1621, "clicks": 24, "reach": 1374}, {"date": "2026-02-24", "spend": 60.22, "impressions": 1354, "clicks": 41, "reach": 1081}, {"date": "2026-02-25", "spend": 57.46, "impressions": 1611, "clicks": 25, "reach": 1307}, {"date": "2026-02-26", "spend": 64.18, "impressions": 1457, "clicks": 24, "reach": 1175}, {"date": "2026-02-27", "spend": 57.57, "impressions": 1234, "clicks": 20, "reach": 1063}, {"date": "2026-02-28", "spend": 57.64, "impressions": 1511, "clicks": 38, "reach": 1225}, {"date": "2026-03-01", "spend": 70.51, "impressions": 1629, "clicks": 46, "reach": 1380}, {"date": "2026-03-02", "spend": 69.64, "impressions": 1798, "clicks": 41, "reach": 1460}];

let currentRange = 7;
let performanceChart, reachChart;

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toLocaleString();
}

function formatCurrency(amount) {
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    minimumFractionDigits: 2
  }).format(amount);
}

function getChangeClass(current, previous) {
  if (current > previous) return 'up';
  if (current < previous) return 'down';
  return 'neutral';
}

function getChangeText(current, previous) {
  if (previous === 0) return current > 0 ? '+100%' : '0%';
  const change = ((current - previous) / previous * 100);
  return (change >= 0 ? '+' : '') + change.toFixed(1) + '%';
}

function updateKPIs() {
  const data = KPI_DATA[currentRange];
  const prev = data.prev;

  const kpis = [
    {
      label: 'Total Spend',
      value: formatCurrency(data.spend),
      change: getChangeText(data.spend, prev.spend),
      changeClass: getChangeClass(data.spend, prev.spend)
    },
    {
      label: 'Leads Generated',
      value: formatNumber(data.leads),
      change: getChangeText(data.leads, 0),
      changeClass: 'up'
    },
    {
      label: 'Cost Per Lead',
      value: data.leads > 0 ? formatCurrency(data.spend / data.leads) : '$0.00',
      change: 'Lead gen campaign',
      changeClass: 'neutral'
    }
  ];

  document.getElementById('kpiRow').innerHTML = kpis.map(kpi => `
    <div class="kpi-card">
      <div class="kpi-label">${kpi.label}</div>
      <div class="kpi-value">${kpi.value}</div>
      <div class="kpi-change ${kpi.changeClass}">${kpi.change}</div>
    </div>
  `).join('');
}

function updateCampaigns() {
  const campaigns = CAMPAIGNS_BY_RANGE[currentRange] || [];

  document.getElementById('campaignBody').innerHTML = campaigns.map(campaign => `
    <tr>
      <td>${campaign.campaign_name}</td>
      <td><span class="pill pill-active">Active</span></td>
      <td>${formatCurrency(campaign.spend)}</td>
      <td>${formatNumber(campaign.impressions)}</td>
      <td>${formatNumber(campaign.reach)}</td>
      <td>${formatNumber(campaign.clicks)}</td>
      <td>${campaign.ctr.toFixed(2)}%</td>
      <td>${formatCurrency(campaign.cpc)}</td>
      <td>${campaign.leads}</td>
      <td><a href="https://www.facebook.com/ads/library/?active_status=all&ad_type=all&country=US&search_type=keyword_unordered&q=${encodeURIComponent(campaign.campaign_name)}" target="_blank" class="view-link"><svg viewBox="0 0 24 24"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/><path d="M5 5v14h14v-7h2v7c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h7v2H5z"/></svg>View</a></td>
    </tr>
  `).join('');
}

function updateCharts() {
  const dailyData = currentRange === 7 ? DAILY_7 : DAILY_30;
  const labels = dailyData.map(day => new Date(day.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));

  // Destroy existing charts
  if (performanceChart) performanceChart.destroy();
  if (reachChart) reachChart.destroy();

  // Performance Chart (Spend + estimated leads)
  performanceChart = new Chart(document.getElementById('performanceChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Daily Spend',
        data: dailyData.map(day => day.spend),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99, 102, 241, 0.1)',
        tension: 0.4,
        fill: true,
        yAxisID: 'y'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true }
      },
      scales: {
        y: {
          type: 'linear',
          display: true,
          position: 'left',
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.1)' },
          ticks: {
            color: '#a1a1aa',
            callback: function(value) { return '$' + value; }
          }
        },
        x: {
          grid: { color: 'rgba(255,255,255,0.1)' },
          ticks: { color: '#a1a1aa' }
        }
      }
    }
  });

  // Reach Chart
  reachChart = new Chart(document.getElementById('reachChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Daily Reach',
        data: dailyData.map(day => day.reach),
        borderColor: '#22c55e',
        backgroundColor: 'rgba(34, 197, 94, 0.1)',
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.1)' },
          ticks: {
            color: '#a1a1aa',
            callback: function(value) { return formatNumber(value); }
          }
        },
        x: {
          grid: { color: 'rgba(255,255,255,0.1)' },
          ticks: { color: '#a1a1aa' }
        }
      }
    }
  });
}

function updatePeriodBadge() {
  const badges = {
    7: 'Feb 20 – Feb 26, 2026',
    30: 'Jan 28 – Feb 26, 2026'
  };
  document.getElementById('periodBadge').textContent = badges[currentRange];
}

function setRange(range) {
  currentRange = range;

  // Update active pill
  document.querySelectorAll('.date-pill').forEach(pill => pill.classList.remove('active'));
  document.querySelector(`[onclick="setRange(${range})"]`).classList.add('active');

  // Update data
  updatePeriodBadge();
  updateKPIs();
  updateCampaigns();
  updateCharts();
}

// Initialize dashboard
document.addEventListener('DOMContentLoaded', function() {
  setRange(7);
});
</script>
</body>
</html>
