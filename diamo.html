let currentRange='7',chart=null;

function pctChange(curr,prev){
  if(prev===undefined||prev===null||prev===0)return"";
  const pct=((curr-prev)/Math.abs(prev)*100).toFixed(1);
  const cls=pct>=0?"up":"down";
  const arrow=pct>=0?"▲":"▼";
  return'<div class="change '+cls+'">'+arrow+' '+Math.abs(pct)+'%</div>';
}

function fmt(v,type){
  if(type==='money')return'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(type==='pct')return Number(v).toFixed(2)+'%';
  if(type==='dec')return'$'+Number(v).toFixed(2);
  return Number(v).toLocaleString('en-US');
}

function render(){
  const kpi=DATA.kpis[currentRange]||{};
  const prev=kpi.prev||{};

  let cards=[
    {label:'Spend',value:fmt(kpi.spend||0,'money'),change:pctChange(kpi.spend||0,prev.spend)},
    {label:'Impressions',value:fmt(kpi.impressions||0,'num'),change:pctChange(kpi.impressions||0,prev.impressions)},
    {label:'Reach',value:fmt(kpi.reach||0,'num'),change:pctChange(kpi.reach||0,prev.reach)},
    {label:'Clicks',value:fmt(kpi.clicks||0,'num'),change:pctChange(kpi.clicks||0,prev.clicks)},
    {label:'CTR',value:fmt(kpi.ctr||0,'pct'),change:pctChange(kpi.ctr||0,prev.ctr)},
    {label:'CPC',value:fmt(kpi.cpc||0,'dec'),change:pctChange(kpi.cpc||0,prev.cpc)},
    {label:'Leads',value:fmt(kpi.leads||0,'num'),change:pctChange(kpi.leads||0,prev.leads)},
    {label:'Video Views',value:fmt(kpi.video_views||0,'num'),change:pctChange(kpi.video_views||0,prev.video_views)},
  ];

  document.getElementById('kpiGrid').innerHTML=cards.map(c=>'<div class="kpi-card"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div>'+c.change+'</div>').join('');

  const daily=DATA.daily||[];
  const labels=daily.map(r=>r.date.slice(5));
  const spendData=daily.map(r=>r.spend);
  const leadsData=daily.map(r=>r.leads||0);

  if(chart)chart.destroy();
  const ctx=document.getElementById('dailyChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Daily Spend',data:spendData,backgroundColor:'rgba(111,26,232,0.7)',borderRadius:4,yAxisID:'y'},
      {label:'Leads',data:leadsData,type:'line',borderColor:'#34a853',backgroundColor:'rgba(52,168,83,0.2)',pointRadius:3,yAxisID:'y1',fill:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888'}}},scales:{
      x:{ticks:{color:'#888'},grid:{display:false}},
      y:{position:'left',ticks:{color:'#888',callback:v=>'$'+v},grid:{color:'#222'}},
      y1:{position:'right',ticks:{color:'#34a853'},grid:{display:false}}
    }}
  });

  const camps=(DATA.campaigns_by_range||{})[currentRange]||[];
  let th='<tr><th>Campaign</th><th>Spend</th><th>Impressions</th><th>Reach</th><th>Clicks</th><th>CTR</th><th>CPC</th><th>Leads</th><th>Video Views</th></tr>';
  let rows=camps.map(c=>'<tr><td>'+c.campaign_name+'</td><td>'+fmt(c.spend,'money')+'</td><td>'+fmt(c.impressions,'num')+'</td><td>'+fmt(c.reach,'num')+'</td><td>'+fmt(c.clicks,'num')+'</td><td>'+fmt(c.ctr,'pct')+'</td><td>'+fmt(c.cpc,'dec')+'</td><td>'+fmt(c.leads||0,'num')+'</td><td>'+fmt(c.video_views||0,'num')+'</td></tr>').join('');
  document.getElementById('campaignTable').innerHTML=camps.length?'<table>'+th+rows+'</table>':'<p style="color:#666;text-align:center;padding:20px;">No active campaigns in this period</p>';
}

document.getElementById('rangeTabs').addEventListener('click',e=>{
  const t=e.target.closest('.range-tab');if(!t)return;
  document.querySelectorAll('.range-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');currentRange=t.dataset.range;render();
});
render();
</script>
