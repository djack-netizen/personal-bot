<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lunchbreak — Daily Viral Clips</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Oswald:wght@500;600&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF6EC; --cream-dark: #F5EBDA;
  --red: #C8372D; --red-dark: #A12B23; --red-light: #E8564D;
  --blue: #2B4C7E; --blue-light: #3D6DB5; --blue-dark: #1A3456;
  --navy: #0F1923; --gold: #D4A843; --gold-light: #E8C56D;
  --text-dark: #1A1A1A; --text-mid: #4A4A4A; --text-light: #8A8A8A;
  --border: #E0D5C4; --card-bg: #FFFFFF; --success: #2D8B46; --warning: #D4943A;
  --shadow-lg: 0 8px 32px rgba(15,25,35,0.12);
  --radius: 12px; --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Barlow', -apple-system, sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* HEADER */
.header { background: var(--navy); color: var(--cream); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--red); }
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon { width: 48px; height: 48px; background: var(--red); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 2px 8px rgba(200,55,45,0.4); }
.brand-title { font-family: 'Yellowtail', cursive; font-weight: 400; font-size: 34px; line-height: 1; }
.brand-subtitle { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin-top: 2px; }
.header-stats { display: flex; gap: 20px; align-items: center; }
.stat-pill { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); }
.stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.stat-pill .count { font-weight: 600; color: white; }

/* DATE PICKER */
.date-bar { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.date-bar::-webkit-scrollbar { display: none; }
.date-chip { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-mid); cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
.date-chip:hover { border-color: var(--blue); color: var(--blue); }
.date-chip.active { background: var(--red); color: white; border-color: var(--red); }
.date-chip .day-name { font-size: 10px; opacity: 0.7; }

/* TOOLBAR */
.toolbar { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); }
.filter-btn { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-mid); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
.filter-btn:hover { border-color: var(--blue); color: var(--blue); }
.filter-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.filter-btn.active-red { background: var(--red); color: white; border-color: var(--red); }
.filter-btn.active-gold { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.filter-btn .badge { font-size: 10px; background: rgba(0,0,0,0.15); padding: 1px 6px; border-radius: 10px; }
.filter-btn.active .badge, .filter-btn.active-red .badge, .filter-btn.active-gold .badge { background: rgba(255,255,255,0.25); }
.toolbar-spacer { flex: 1; }
.search-box { font-family: 'Barlow', sans-serif; font-size: 13px; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-dark); width: 180px; outline: none; transition: all 0.2s; }
.search-box:focus { border-color: var(--blue); width: 240px; }

/* GRID */
.grid { max-width: 1200px; margin: 0 auto; padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

/* CARD */
.card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: all 0.25s ease; cursor: pointer; position: relative; }
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--blue-light); }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
.card-account { display: flex; align-items: center; gap: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 13px; color: white; text-transform: uppercase; flex-shrink: 0; }
.account-name { font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 14px; color: var(--text-dark); }
.account-category { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }
.priority-badge { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 12px; text-transform: uppercase; letter-spacing: 1px; }
.priority-HIGH { background: #FDE8E7; color: var(--red); border: 1px solid #F5C4C2; }
.priority-MEDIUM { background: #FEF3E2; color: #B8760C; border: 1px solid #F5DDB5; }
.priority-LOW { background: #E8F5EC; color: var(--success); border: 1px solid #B8DFCA; }
.card-caption { padding: 0 16px 12px; font-size: 13px; color: var(--text-mid); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-stats { display: flex; border-top: 1px solid var(--border); background: var(--cream); }
.card-stat { flex: 1; padding: 10px 12px; text-align: center; border-right: 1px solid var(--border); }
.card-stat:last-child { border-right: none; }
.card-stat-value { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; color: var(--text-dark); }
.card-stat-label { font-family: 'Oswald', sans-serif; font-size: 9px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.card-stat-value.high-eng { color: var(--red); }
.card-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid var(--border); }
.card-date { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.card-action-btn { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 6px; border: 1.5px solid var(--border); background: white; color: var(--text-mid); cursor: pointer; transition: all 0.2s; }
.card-action-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }
.card-action-btn.posted { background: var(--success); color: white; border-color: var(--success); }
.card-action-btn.download { background: var(--navy); color: white; border-color: var(--navy); }
.card-action-btn.download:hover { background: var(--blue); border-color: var(--blue); }

/* LOADING / EMPTY */
.loading { text-align: center; padding: 80px 24px; color: var(--text-light); }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 80px 24px; }
.empty-state-title { font-family: 'Yellowtail', cursive; font-size: 26px; color: var(--text-dark); margin-bottom: 8px; }
.empty-state-text { font-size: 14px; color: var(--text-light); }

/* FOOTER */
.footer { max-width: 1200px; margin: 40px auto 0; padding: 20px 24px; border-top: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.footer-brand { font-family: 'Yellowtail', cursive; font-size: 16px; color: var(--text-light); }
.footer-meta { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .header { padding: 14px 16px; }
  .brand-title { font-size: 28px; }
  .header-stats { display: none; }
  .date-bar { padding: 10px 16px; }
  .toolbar { padding: 10px 16px; }
  .search-box { width: 100%; order: -1; }
  .search-box:focus { width: 100%; }
  .grid { padding: 12px 16px; grid-template-columns: 1fr; gap: 12px; }
  .card-stats { flex-wrap: wrap; }
  .card-stat { min-width: 25%; }
  .footer { flex-direction: column; gap: 8px; text-align: center; }
}
@media (max-width: 420px) {
  .filter-btn { padding: 5px 10px; font-size: 11px; }
  .brand-icon { width: 38px; height: 38px; font-size: 20px; }
  .brand-title { font-size: 24px; }
  .card-action-btn { padding: 4px 8px; font-size: 10px; }
}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="brand"><div class="brand-icon">🧰</div><div><div class="brand-title">Lunchbreak</div><div class="brand-subtitle">Daily Viral Clips for Baby Jake to cook up</div></div></div><div class="header-stats"><div class="stat-pill"><span class="dot"></span><span>Today:</span><span class="count" id="todayCount">0</span><span>clips</span></div><div class="stat-pill"><span>High:</span><span class="count" id="highCount">0</span></div></div></div></header>

<!-- DATE PICKER -->
<div class="date-bar" id="dateBar"></div>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
<button class="filter-btn active" data-filter="all">All <span class="badge" id="allBadge">0</span></button>
<button class="filter-btn" data-filter="HIGH">High</button>
<button class="filter-btn" data-filter="MEDIUM">Medium</button>
<button class="filter-btn" data-filter="posted">Posted</button>
<button class="filter-btn" data-filter="unposted">Queue</button>
<span class="toolbar-spacer"></span>
<input type="text" class="search-box" placeholder="Search accounts..." id="searchBox">
</div>

<div class="grid" id="clipGrid"><div class="loading"><div class="loading-spinner"></div><div>Scanning reels...</div></div></div>

<div class="footer"><div class="footer-brand">Lunchbreak 2026</div><div class="footer-meta" id="lastUpdated">Last scan: loading...</div></div>

<script>
const SID='1TxAcALNsWi2PRQUZ2X7pOkE_hexkuL4779_p02r8xm8',HN='Daily Picks',SU=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(HN)}`;
let A=[],CF='all',SQ='',selectedDate=null;

// DATE PICKER — build 15 days
function buildDatePicker(){
  const bar=document.getElementById('dateBar');
  const today=new Date();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html='';
  for(let i=0;i<15;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    const label=i===0?'Today':i===1?'Yesterday':`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
    html+=`<button class="date-chip${i===0?' active':''}" data-date="${iso}">${label}</button>`;
  }
  bar.innerHTML=html;
  selectedDate=today.toISOString().slice(0,10);
  bar.addEventListener('click',e=>{
    const chip=e.target.closest('.date-chip');if(!chip)return;
    selectedDate=chip.dataset.date;
    bar.querySelectorAll('.date-chip').forEach(c=>c.className='date-chip');
    chip.className='date-chip active';
    rG();
  });
}

async function fD(){try{const r=await fetch(SU),t=await r.text(),j=JSON.parse(t.match(/google\.visualization\.Query\.setResponse\((.+)\);?/)[1]);A=j.table.rows.map((r,i)=>{const g=n=>{const c=r.c[n];return c?(c.f||c.v||''):'';};return{rank:i+1,date:g(0),account:String(g(2)).replace(/^@/,''),tiktokHandle:String(g(3)).replace(/^@/,''),category:g(4),reelUrl:eU(g(5)),views:pN(g(6)),likes:pN(g(7)),comments:pN(g(8)),engagement:parseFloat(g(9))||0,priority:(g(10)||'').toUpperCase().trim(),posted:(g(11)||'').toLowerCase().includes('yes'),notes:g(17)};}).filter(c=>c.account);rA();}catch(e){document.getElementById('clipGrid').innerHTML='<div class="empty-state"><div class="empty-state-title">Connection Issue</div><div class="empty-state-text">Refresh to retry.</div></div>';}}

function eU(v){if(!v)return'';const s=String(v);const m=s.match(/https?:\/\/[^\s"')]+/);return m?m[0]:s;}
function pN(v){if(!v)return 0;return parseInt(String(v).replace(/[^0-9.]/g,''))||0;}
function rA(){
  const dateClips=selectedDate?A.filter(c=>c.date===selectedDate):A;
  const high=dateClips.filter(c=>c.priority==='HIGH');
  document.getElementById('todayCount').textContent=dateClips.length;
  document.getElementById('highCount').textContent=high.length;
  document.getElementById('allBadge').textContent=dateClips.length;
  document.getElementById('lastUpdated').textContent='Last scan: '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  rG();
}
function gF(){
  let c=selectedDate?A.filter(x=>x.date===selectedDate):[...A];
  if(CF==='HIGH'||CF==='MEDIUM'||CF==='LOW')c=c.filter(x=>x.priority===CF);
  else if(CF==='posted')c=c.filter(x=>x.posted);
  else if(CF==='unposted')c=c.filter(x=>!x.posted);
  if(SQ){const q=SQ.toLowerCase();c=c.filter(x=>x.account.toLowerCase().includes(q)||x.category.toLowerCase().includes(q)||(x.notes||'').toLowerCase().includes(q));}
  return c;
}
function rG(){
  const g=document.getElementById('clipGrid'),cs=gF();
  if(!cs.length){g.innerHTML='<div class="empty-state"><div class="empty-state-title">No clips for this day</div><div class="empty-state-text">Try picking a different date or changing filters.</div></div>';return;}
  g.innerHTML=cs.map(rC).join('');
}
function rC(c){
  const ini=c.account.slice(0,2).toUpperCase(),eC=c.engagement>=5?'high-eng':'',pC=c.posted?'posted':'',pT=c.posted?'Posted':'Queue';
  const cc={'chef':'#C8372D','cocktail':'#2B4C7E','food media':'#D4A843','bartender':'#6B4C8A','food creator':'#2D8B46','viral_food_creators':'#C8372D','food_beverage_culture':'#D4A843','chef_personality':'#6B4C8A','restaurant_bar_brands':'#2B4C7E','diy_recipes':'#2D8B46'};
  const ac=cc[(c.category||'').toLowerCase()]||'#2B4C7E';
  const catLabel=(c.category||'Uncategorized').replace(/_/g,' ');
  try{return`<div class="card" onclick="openReel('${c.reelUrl}')"><div class="card-header"><div class="card-account"><div class="avatar" style="background:${ac}">${ini}</div><div><div class="account-name">@${c.account}</div><div class="account-category">${catLabel}${c.tiktokHandle?' · TT: @'+c.tiktokHandle:''}</div></div></div>${c.priority?`<span class="priority-badge priority-${c.priority}">${c.priority}</span>`:''}</div>${c.notes?`<div class="card-caption">${eH(c.notes)}</div>`:''}
<div class="card-stats"><div class="card-stat"><div class="card-stat-value">${fN(c.views)}</div><div class="card-stat-label">Views</div></div><div class="card-stat"><div class="card-stat-value">${fN(c.likes)}</div><div class="card-stat-label">Likes</div></div><div class="card-stat"><div class="card-stat-value">${fN(c.comments)}</div><div class="card-stat-label">Comments</div></div><div class="card-stat"><div class="card-stat-value ${eC}">${c.engagement.toFixed(1)}%</div><div class="card-stat-label">Engagement</div></div></div>
<div class="card-footer"><div class="card-date">${c.date||'-'}</div><div class="card-actions"><button class="card-action-btn" onclick="event.stopPropagation();openReel('${c.reelUrl}')">View Reel</button><button class="card-action-btn download" onclick="event.stopPropagation();dlReel('${c.reelUrl}',this)">Copy Link</button><button class="card-action-btn ${pC}" onclick="event.stopPropagation()">${pT}</button></div></div></div>`;}catch(e){return'';}
}
function fN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString();}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function openReel(u){if(u&&u.startsWith('http'))window.open(u,'_blank');}
function dlReel(u,btn){if(!u||!u.startsWith('http'))return;navigator.clipboard.writeText(u).then(()=>{if(btn){const orig=btn.textContent;btn.textContent='Copied!';btn.style.background='var(--success)';btn.style.borderColor='var(--success)';btn.style.color='white';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.borderColor='';btn.style.color='';},1500);}}).catch(()=>{window.prompt('Copy this link:',u);});}
document.getElementById('toolbar').addEventListener('click',e=>{const b=e.target.closest('.filter-btn');if(!b)return;CF=b.dataset.filter;document.querySelectorAll('.filter-btn').forEach(x=>x.className='filter-btn');if(CF==='HIGH')b.className='filter-btn active-red';else if(CF==='MEDIUM')b.className='filter-btn active-gold';else b.className='filter-btn active';rG();});
document.getElementById('searchBox').addEventListener('input',e=>{SQ=e.target.value;rG();});
buildDatePicker();
fD();
setInterval(fD,5*60*1000);
</script>
</body>
</html>
